<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammed Alnajdawi | AI & ML Portfolio</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand': {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                            950: '#082f49',
                        },
                        'surface': {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0ea5e9;
        }
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.1);
        }
        .section-pattern {
            background-image: radial-gradient(circle at 1px 1px, #e2e8f0 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-white text-surface-900">
    <div id="root"></div>

    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Intersection Observer Hook
        const useInView = (options = {}) => {
            const [isInView, setIsInView] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsInView(true);
                            observer.unobserve(entry.target);
                        }
                    }, { threshold: options.threshold || 0.15, ...options }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return [ref, isInView];
        };

        // Animated Section Component
        const AnimatedSection = ({ children, className = '', delay = 0 }) => {
            const [ref, isInView] = useInView({ threshold: 0.1 });
            return (
                <div
                    ref={ref}
                    className={`transition-all duration-700 ease-out ${
                        isInView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'
                    } ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // Navigation Component
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 40);
                    const sections = ['home', 'about', 'education', 'skills', 'projects', 'certificates', 'contact'];
                    for (const section of sections.reverse()) {
                        const el = document.getElementById(section);
                        if (el && window.scrollY >= el.offsetTop - 200) {
                            setActiveSection(section);
                            break;
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { id: 'home', label: 'Home' },
                { id: 'about', label: 'About' },
                { id: 'education', label: 'Education' },
                { id: 'skills', label: 'Skills' },
                { id: 'projects', label: 'Projects' },
                { id: 'certificates', label: 'Certificates' },
                { id: 'contact', label: 'Contact' },
            ];

            const scrollTo = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                setMobileOpen(false);
            };

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${
                    scrolled
                        ? 'bg-white/90 backdrop-blur-xl border-b border-gray-200 shadow-lg shadow-gray-200/50'
                        : 'bg-transparent'
                }`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <button onClick={() => scrollTo('home')} className="flex items-center gap-2 group">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-cyan-500 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-brand-500/30">
                                    M
                                </div>
                                <span className="font-bold text-surface-800 text-lg hidden sm:block">Mohammed Alnajdawi</span>
                            </button>

                            <div className="hidden lg:flex items-center gap-1">
                                {navLinks.map((link) => (
                                    <button
                                        key={link.id}
                                        onClick={() => scrollTo(link.id)}
                                        className={`px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${
                                            activeSection === link.id
                                                ? 'text-brand-600 bg-brand-50 font-semibold'
                                                : 'text-surface-600 hover:text-surface-900 hover:bg-gray-100'
                                        }`}
                                    >
                                        {link.label}
                                    </button>
                                ))}
                                <button
                                    onClick={() => scrollTo('contact')}
                                    className="ml-2 px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg transition-all duration-200 shadow-lg shadow-brand-500/25"
                                >
                                    Hire Me
                                </button>
                            </div>

                            <button
                                onClick={() => setMobileOpen(!mobileOpen)}
                                className="lg:hidden p-2 rounded-lg text-surface-600 hover:text-surface-900 hover:bg-gray-100 transition-colors"
                            >
                                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    {mobileOpen ? (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    ) : (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    )}
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div className={`lg:hidden transition-all duration-300 overflow-hidden ${
                        mobileOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'
                    }`}>
                        <div className="px-4 pb-4 space-y-1 bg-white/95 backdrop-blur-xl border-t border-gray-200">
                            {navLinks.map((link) => (
                                <button
                                    key={link.id}
                                    onClick={() => scrollTo(link.id)}
                                    className={`block w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-all ${
                                        activeSection === link.id
                                            ? 'text-brand-600 bg-brand-50 font-semibold'
                                            : 'text-surface-600 hover:text-surface-900 hover:bg-gray-100'
                                    }`}
                                >
                                    {link.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </nav>
            );
        };

        // Hero Section
        const Hero = () => {
            return (
                <section id="home" className="relative min-h-screen flex items-center pt-16 overflow-hidden bg-gradient-to-br from-slate-50 via-white to-brand-50">
                    <div className="absolute inset-0 section-pattern opacity-30"></div>
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-400/10 rounded-full blur-3xl"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-80 h-80 bg-cyan-400/10 rounded-full blur-3xl"></div>

                    <div className="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            <div>
                                <AnimatedSection>
                                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-brand-50 border border-brand-200 text-brand-700 text-sm font-medium mb-6">
                                        <span className="relative flex h-2.5 w-2.5">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-500"></span>
                                        </span>
                                        Open to AI/ML Opportunities
                                    </div>
                                </AnimatedSection>

                                <AnimatedSection delay={150}>
                                    <h1 className="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-surface-900 mb-4 leading-tight">
                                        Hi, I'm{' '}
                                        <span className="gradient-text">Mohammed</span>
                                        <br />
                                        <span className="text-2xl sm:text-3xl lg:text-4xl font-semibold text-surface-600">
                                            AI & Machine Learning Engineer
                                        </span>
                                    </h1>
                                </AnimatedSection>

                                <AnimatedSection delay={300}>
                                    <p className="text-lg text-surface-600 mb-8 leading-relaxed">
                                        Fresh graduate in Artificial Intelligence from Zarqa University.
                                        Passionate about building intelligent systems, deep learning models,
                                        and IoT solutions that solve real-world problems.
                                    </p>
                                </AnimatedSection>

                                <AnimatedSection delay={450}>
                                    <div className="flex flex-wrap gap-4">
                                        <button
                                            onClick={() => document.getElementById('projects')?.scrollIntoView({ behavior: 'smooth' })}
                                            className="px-7 py-3.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-brand-500/25 hover:shadow-xl hover:shadow-brand-500/30"
                                        >
                                            View My Projects
                                        </button>
                                        <button
                                            onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })}
                                            className="px-7 py-3.5 bg-white hover:bg-gray-50 text-surface-800 font-semibold rounded-xl border border-gray-200 transition-all duration-200 hover:border-brand-300 hover:shadow-lg"
                                        >
                                            Get In Touch
                                        </button>
                                    </div>
                                </AnimatedSection>

                                <AnimatedSection delay={600}>
                                    <div className="mt-10 flex flex-wrap items-center gap-6 text-surface-500 text-sm">
                                        <div className="flex items-center gap-2">
                                            <span className="text-2xl font-bold text-brand-600">B.Sc.</span>
                                            <span>Artificial Intelligence</span>
                                        </div>
                                        <div className="w-px h-5 bg-gray-300"></div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-2xl font-bold text-brand-600">2025</span>
                                            <span>Graduate</span>
                                        </div>
                                        <div class="mt-10 flex flex-wrap items-center gap-4"><a href="https://www.linkedin.com/in/mohammed-alnajdawi" target="_blank" rel="noopener noreferrer" class="social-link p-3 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-blue-300">
                                            <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z">
                                                    </path>
                                                    </svg>
                                                    </a>
                                                    <a href="https://github.com/hotshooter" target="_blank" rel="noopener noreferrer" class="social-link p-3 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-400">
                                                        <svg class="w-5 h-5 text-gray-800" fill="currentColor" viewBox="0 0 24 24">
                                                            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12">
                                                                </path>
                                                                </svg>
                                                                </a>
                                                                
                                                    </div>
                                    </div>
                                </AnimatedSection>
                            </div>

                            <AnimatedSection delay={200}>
                                <div className="relative flex justify-center">
                                    <div className="w-64 h-64 sm:w-80 sm:h-80 rounded-full bg-gradient-to-br from-brand-500 to-cyan-500 flex items-center justify-center shadow-2xl shadow-brand-500/30 animate-float">
                                        <div className="w-[calc(100%-16px)] h-[calc(100%-16px)] rounded-full bg-white flex items-center justify-center">
                                            <span className="text-6xl font-bold gradient-text">MA</span>
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-4 -right-4 bg-white rounded-2xl shadow-xl p-4 border border-gray-100">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-lg bg-green-50 flex items-center justify-center">
                                                <svg className="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            </div>
                                            <div>
                                                <p className="text-sm font-semibold text-surface-900">Zarqa University</p>
                                                <p className="text-xs text-surface-500">AI Graduate 2025</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </AnimatedSection>
                        </div>
                    </div>
                </section>
            );
        };

        // About Section
        const About = () => {
            return (
                <section id="about" className="py-20 sm:py-28 bg-white">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                        <AnimatedSection>
                            <div className="text-center mb-14">
                                <span className="text-brand-600 text-sm font-semibold tracking-widest uppercase">About Me</span>
                                <h2 className="text-4xl sm:text-5xl font-bold text-surface-900 mt-3 mb-4">
                                    AI Engineer <span className="gradient-text">In The Making</span>
                                </h2>
                                <p className="text-surface-600 max-w-2xl mx-auto text-lg">
                                    A dedicated AI graduate with hands-on experience in machine learning,
                                    deep learning, and IoT systems.
                                </p>
                            </div>
                        </AnimatedSection>

                        <div className="grid lg:grid-cols-3 gap-8">
                            <AnimatedSection delay={200}>
                                <div className="bg-gradient-to-br from-brand-50 to-white rounded-2xl p-8 border border-brand-100 card-hover">
                                    <div className="w-14 h-14 rounded-xl bg-brand-100 flex items-center justify-center mb-5">
                                        <svg className="w-7 h-7 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-xl font-bold text-surface-900 mb-3">AI & ML Focus</h3>
                                    <p className="text-surface-600 leading-relaxed">
                                        Specialized in machine learning algorithms, deep learning architectures,
                                        and computer vision applications. Experienced with Python, TensorFlow,
                                        and scikit-learn.
                                    </p>
                                </div>
                            </AnimatedSection>

                            <AnimatedSection delay={350}>
                                <div className="bg-gradient-to-br from-cyan-50 to-white rounded-2xl p-8 border border-cyan-100 card-hover">
                                    <div className="w-14 h-14 rounded-xl bg-cyan-100 flex items-center justify-center mb-5">
                                        <svg className="w-7 h-7 text-cyan-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-xl font-bold text-surface-900 mb-3">IoT & Robotics</h3>
                                    <p className="text-surface-600 leading-relaxed">
                                        Hands-on experience with Arduino programming, sensor integration,
                                        and robotics development. Skilled in AutoCAD and Fusion360 for
                                        hardware design.
                                    </p>
                                </div>
                            </AnimatedSection>

                            <AnimatedSection delay={500}>
                                <div className="bg-gradient-to-br from-purple-50 to-white rounded-2xl p-8 border border-purple-100 card-hover">
                                    <div className="w-14 h-14 rounded-xl bg-purple-100 flex items-center justify-center mb-5">
                                        <svg className="w-7 h-7 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                        </svg>
                                    </div>
                                    <h3 className="text-xl font-bold text-surface-900 mb-3">Continuous Learner</h3>
                                    <p className="text-surface-600 leading-relaxed">
                                        Completed multiple professional certifications including Microsoft Azure
                                        AI Fundamentals and Cisco Data Analytics. Currently pursuing AWS Cloud
                                        Practitioner certification.
                                    </p>
                                </div>
                            </AnimatedSection>
                        </div>
                    </div>
                </section>
            );
        };

        // Education Section
        const Education = () => {
            return (
                <section id="education" className="py-20 sm:py-28 bg-gray-50">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                        <AnimatedSection>
                            <div className="text-center mb-14">
                                <span className="text-brand-600 text-sm font-semibold tracking-widest uppercase">Education</span>
                                <h2 className="text-4xl sm:text-5xl font-bold text-surface-900 mt-3 mb-4">
                                    Academic <span className="gradient-text">Background</span>
                                </h2>
                            </div>
                        </AnimatedSection>

                        <div className="grid lg:grid-cols-2 gap-8">
                            <AnimatedSection delay={150}>
                                <div className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 card-hover">
                                    <div className="flex items-start gap-4 mb-6">
                                        <div className="w-14 h-14 rounded-xl bg-brand-100 flex items-center justify-center flex-shrink-0">
